
grpc
 vrf Mgmt-intf
 port 57344
 no-tls
 address-family ipv4
 listen-addresses 172.17.6.237
!
telemetry model-driven
 destination-group DGroup1
  address-family ipv4 1.1.1.1 port 5432
   encoding self-describing-gpb
   protocol tcp
  !
 !
 sensor-group SGroup1
  sensor-path Cisco-IOS-XR-infra-statsd-oper:infra-statistics/interfaces/interface/latest/generic-counters
 !
 sensor-group SGroup3
  sensor-path openconfig-interfaces:interfaces/interface
 !
 subscription Sub1
  sensor-group-id SGroup1 sample-interval 30000
  destination-id DGroup1
 !
 subscription Sub3
  sensor-group-id SGroup3 sample-interval 30000
 !
!
vrf Mgmt-intf
 address-family ipv4 unicast
  export route-policy VRF-to-Global
 !
!
tpa
 vrf Mgmt-intf
  address-family ipv4
   update-source dataports MgmtEth0/RSP1/CPU0/0
  !
 !
!
control-plane
 management-plane
  inband
   interface all
    allow SSH peer
     address ipv4 172.17.6.214
    !
   !
  !
  out-of-band
   interface MgmtEth0/RSP1/CPU0/0
    allow all
    allow NETCONF
   !
  !
 !
!
netconf-yang agent
 ssh
 with-defaults-support enable
!

interface MgmtEth0/RSP1/CPU0/0
 vrf Mgmt-intf
 ipv4 address 172.17.6.237 255.255.255.0
!

route-policy VRF-to-Global
  if destination in (172.17.6.0/24) then
    pass
  endif
end-policy
!

xml agent tty
!
netconf agent tty
 session timeout 10
!

!
ssh server logging
ssh timeout 120
ssh server session-limit 15
ssh server v2
ssh server vrf default ipv4 access-list ACL_IP_MANAGEMENT
ssh server vrf Mgmt-intf
ssh server netconf vrf default
ssh server netconf vrf Mgmt-intf
